<!DOCTYPE html>
<html>
<head>
    <title>Single Page Layout</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        nav{
            background:#333;
            color:white;
            padding:15px;
            text-align:center;
        }

        nav a{
            color:white;
            text-decoration:none;
            margin:0 15px;
        }

        section{
            padding:60px 20px;
            text-align:center;
        }

        #home{
            background:#4CAF50;
            color:white;
        }

        #about{
            background:#f4f4f4;
        }

        #services{
            background:#ddd;
        }

        #contact{
            background:#333;
            color:white;
        }

        footer{
            background:black;
            color:white;
            text-align:center;
            padding:15px;
        }
    </style>
</head>

<body>

    <!-- Navigation Bar -->
    <nav>
        <h2>My Single Page Website</h2>
        <br>
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#services">Services</a>
        <a href="#contact">Contact</a>
    </nav>

    <!-- Home Section -->
    <section id="home">
        <h1>Welcome to My Website</h1>
        <p>This is the Home Section.</p>
    </section>

    <!-- About Section -->
    <section id="about">
        <h1>About Us</h1>
        <p>We create modern and responsive websites.</p>
    </section>

    <!-- Services Section -->
    <section id="services">
        <h1>Our Services</h1>
        <p>Web Development, UI Design, and Front-End Development.</p>
    </section>

    <!-- Contact Section -->
    <section id="contact">
        <h1>Contact Us</h1>
        <p>Email: example@gmail.com</p>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 My Single Page Website</p>
    </footer>

</body>
</html>
